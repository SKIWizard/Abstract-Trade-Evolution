{% extends "base.html" %}

{% block title %}Маркетплейс – Abstract Trade{% endblock %}

{% block content %}
<style>
    .marketplace-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 30px;
    }
    .filter-bar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
    }
    .filter-select {
        background: #121a24;
        border: 1px solid #2d3748;
        border-radius: 40px;
        padding: 10px 20px;
        color: #eef2fb;
        font-size: 0.9rem;
        cursor: pointer;
    }
    .filter-select:focus {
        outline: none;
        border-color: #0855d1;
    }
    .search-input {
        background: #121a24;
        border: 1px solid #2d3748;
        border-radius: 40px;
        padding: 10px 20px;
        color: #eef2fb;
        font-size: 0.9rem;
        width: 250px;
    }
    .search-input:focus {
        outline: none;
        border-color: #0855d1;
    }
    .nfts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 24px;
        margin-top: 30px;
    }
    .nft-card {
        background: #121a24;
        border-radius: 24px;
        padding: 16px;
        border: 1px solid #2d3748;
        transition: transform 0.2s, border-color 0.2s;
    }
    .nft-card:hover {
        transform: translateY(-4px);
        border-color: #0855d1;
    }
    .nft-preview {
        width: 100%;
        aspect-ratio: 1/1;
        background: #0b0e14;
        border-radius: 16px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .nft-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .nft-preview .placeholder {
        color: #4a5568;
        font-size: 3rem;
    }
    .nft-title {
        font-size: 1rem;
        font-weight: 600;
        color: #cbd5e8;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .nft-seller {
        font-size: 0.7rem;
        color: #7e8da3;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .price-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #253040;
    }
    .price {
        font-size: 1.2rem;
        font-weight: 700;
        color: #0855d1;
    }
    .price small {
        font-size: 0.7rem;
        font-weight: normal;
        color: #7e8da3;
    }
    .buy-btn {
        background: linear-gradient(145deg, #0855d1, #042f73);
        border: none;
        padding: 8px 20px;
        border-radius: 40px;
        color: white;
        font-weight: 600;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .buy-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 0 15px rgba(8,85,209,0.4);
    }
    .buy-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .loading-spinner {
        text-align: center;
        padding: 60px;
    }
    .loading-spinner i {
        font-size: 3rem;
        color: #0855d1;
        animation: spin 1s linear infinite;
    }
    .empty-state {
        text-align: center;
        padding: 80px 20px;
    }
    .empty-state i {
        font-size: 5rem;
        color: #2d3748;
        margin-bottom: 20px;
    }
    .empty-state h3 {
        margin-bottom: 12px;
    }
    .empty-state p {
        color: #8e9db5;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<div style="padding: 40px 0;">
    <div class="marketplace-header">
        <h1>Маркетплейс</h1>
        <div class="filter-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию...">
            <select id="sortSelect" class="filter-select">
                <option value="newest">Сначала новые</option>
                <option value="cheapest">Сначала дешёвые</option>
                <option value="expensive">Сначала дорогие</option>
            </select>
        </div>
    </div>

    <div id="listingsContainer">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <p>Загрузка фракталов...</p>
        </div>
    </div>
</div>

<script>
    const listingsContainer = document.getElementById('listingsContainer');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    let allListings = [];

    function getToken() {
        const token = localStorage.getItem('jwt_token');
        if (token) return token;
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            const [name, value] = cookie.trim().split('=');
            if (name === 'jwt_token') return decodeURIComponent(value);
        }
        return null;
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.borderLeftColor = isError ? '#e5484d' : '#0855d1';
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }

    async function loadListings() {
        try {
            const response = await fetch('/marketplace/listings');
            const data = await response.json();

            if (data.success && data.listings.length > 0) {
                allListings = data.listings;
                await loadPreviewsAndRender();
            } else {
                listingsContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-store"></i>
                        <h3>Нет фракталов в продаже</h3>
                        <p>Будьте первым, кто выставит свой фрактал на продажу!</p>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Error:', error);
            listingsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Ошибка загрузки</h3>
                    <p>Не удалось загрузить фракталы</p>
                </div>
            `;
        }
    }

    async function loadPreviewsAndRender() {
        for (let listing of allListings) {
            try {
                const response = await fetch(`/fractal/fractal/${listing.fractal_id}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                if (data.success) {
                    listing.image = data.image;
                }
            } catch (error) {
                console.error('Error loading preview:', error);
            }
        }
        renderListings();
    }

    function renderListings() {
        let filtered = [...allListings];
        
        const searchTerm = searchInput.value.toLowerCase();
        if (searchTerm) {
            filtered = filtered.filter(l => 
                l.fractal_name.toLowerCase().includes(searchTerm)
            );
        }
        
        const sortBy = sortSelect.value;
        if (sortBy === 'cheapest') {
            filtered.sort((a, b) => a.price - b.price);
        } else if (sortBy === 'expensive') {
            filtered.sort((a, b) => b.price - a.price);
        } else if (sortBy === 'newest') {
            filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        }
        
        if (filtered.length === 0) {
            listingsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <h3>Ничего не найдено</h3>
                    <p>Попробуйте изменить параметры поиска</p>
                </div>
            `;
            return;
        }
        
        listingsContainer.innerHTML = `
            <div class="nfts-grid">
                ${filtered.map(listing => `
                    <div class="nft-card" data-id="${listing.id}">
                        <div class="nft-preview">
                            ${listing.image 
                                ? `<img src="${listing.image}" alt="${listing.fractal_name}">`
                                : `<div class="placeholder"><i class="fas fa-cube"></i></div>`
                            }
                        </div>
                        <div class="nft-title">${escapeHtml(listing.fractal_name)}</div>
                        <div class="nft-seller">
                            <i class="fas fa-user-circle"></i>
                            ${shortenAddress(listing.seller_address)}
                        </div>
                        <div class="price-row">
                            <span class="price">${listing.price} <small>FRX</small></span>
                            <button class="buy-btn" onclick="buyFractal(${listing.id}, ${listing.price})">Купить</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function shortenAddress(address) {
        if (!address) return 'unknown';
        return address.slice(0, 6) + '...' + address.slice(-4);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function buyFractal(listingId, price) {
        const token = getToken();
        if (!token) {
            showToast('Необходимо авторизоваться для покупки', true);
            return;
        }
        
        if (!confirm(`Купить этот фрактал за ${price} FRX?`)) return;
        
        try {
            const response = await fetch(`/marketplace/buy/${listingId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            const data = await response.json();
            
            if (data.success) {
                showToast('Фрактал успешно куплен!', false);
                loadListings();
            } else {
                showToast(data.error || 'Ошибка при покупке', true);
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('Ошибка соединения', true);
        }
    }

    searchInput.addEventListener('input', () => renderListings());
    sortSelect.addEventListener('change', () => renderListings());
    
    loadListings();
</script>
{% endblock %}
