<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Trade · Генератор фракталов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #eef2fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(11,14,20,0.95);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.6rem;
            text-decoration: none;
            color: white;
        }

        .logo i {
            color: #0855d1;
            font-size: 1.8rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: #eef2fb;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(8,85,209,0.2);
            border-color: #0855d1;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .center-wrapper {
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .generate-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(145deg, #0855d1, #042f73);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            box-shadow: 0 0 60px rgba(8,85,209,0.3), 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(145deg, rgba(255,255,255,0.2), transparent 60%);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        .generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 90px rgba(8,85,209,0.5), 0 24px 48px rgba(0,0,0,0.6);
        }

        .generate-btn:active {
            transform: scale(0.95);
            transition: all 0.1s ease;
        }

        .generate-btn i {
            font-size: 2.5rem;
        }

        .fractal-container {
            width: 100%;
            background: #10161f;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #2a3343;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease;
        }

        .fractal-image {
            width: 100%;
            border-radius: 20px;
            display: block;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .loading i {
            font-size: 3rem;
            color: #0855d1;
            animation: spin 1s linear infinite;
        }

        .loading p {
            color: #8e9db5;
            font-size: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            border-left: 4px solid #0855d1;
            z-index: 1100;
            color: #eef2fb;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .auth-warning {
            text-align: center;
            padding: 40px;
            background: #10161f;
            border-radius: 32px;
            border: 1px solid #e5484d40;
        }

        .auth-warning i {
            font-size: 4rem;
            color: #e5484d;
            margin-bottom: 20px;
        }

        .auth-warning h2 {
            margin-bottom: 16px;
        }

        .auth-warning p {
            color: #8e9db5;
            margin-bottom: 24px;
        }

        .auth-warning .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #0855d1;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }
            .logo {
                font-size: 1.2rem;
            }
            .main-container {
                padding: 24px 16px;
            }
            .generate-btn {
                width: 180px;
                height: 180px;
                font-size: 1.1rem;
            }
            .generate-btn i {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .generate-btn {
                width: 150px;
                height: 150px;
                font-size: 0.95rem;
                gap: 10px;
            }
            .generate-btn i {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <i class="fas fa-cube"></i>
            <span>Abstract Trade</span>
        </a>
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            <span>На главную</span>
        </a>
    </header>

    <div class="main-container">
        <div class="center-wrapper" id="centerWrapper">
            <div class="auth-warning" id="authWarning" style="display: none;">
                <i class="fas fa-lock"></i>
                <h2>Требуется авторизация</h2>
                <p>Для генерации фракталов необходимо подключить криптокошелек</p>
                <button class="btn" id="connectWalletBtn">Подключить кошелек</button>
            </div>
            <button class="generate-btn" id="generateBtn" style="display: none;">
                <i class="fas fa-cube"></i>
                <span>Сгенерировать</span>
            </button>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>

    <script>
        const centerWrapper = document.getElementById('centerWrapper');
        const generateBtn = document.getElementById('generateBtn');
        const authWarning = document.getElementById('authWarning');
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const toast = document.getElementById('toastMsg');

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.opacity = '1';
            toast.style.borderLeftColor = isError ? '#e5484d' : '#0855d1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        function getToken() {
            const token = localStorage.getItem('jwt_token');
            if (token) {
                return token;
            }
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'jwt_token') {
                    return decodeURIComponent(value);
                }
            }
            return null;
        }

        async function checkAuth() {
            const token = getToken();
            if (token) {
                try {
                    const response = await fetch('/auth/me', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    if (response.ok) {
                        if (generateBtn) generateBtn.style.display = 'flex';
                        if (authWarning) authWarning.style.display = 'none';
                        return true;
                    } else {
                        localStorage.removeItem('jwt_token');
                        localStorage.removeItem('wallet_address');
                        document.cookie = 'jwt_token=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
                        if (generateBtn) generateBtn.style.display = 'none';
                        if (authWarning) authWarning.style.display = 'block';
                        return false;
                    }
                } catch (error) {
                    console.error('Auth check error:', error);
                    return false;
                }
            } else {
                if (generateBtn) generateBtn.style.display = 'none';
                if (authWarning) authWarning.style.display = 'block';
                return false;
            }
        }

        function showLoading() {
            centerWrapper.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Генерация фрактала...</p>
                </div>
            `;
        }

        function showFractal(imageSrc) {
            centerWrapper.innerHTML = `
                <div class="fractal-container">
                    <img class="fractal-image" src="${imageSrc}" alt="Фрактал">
                    <div style="margin-top: 20px; text-align: center;">
                        <button class="generate-btn" id="generateAgainBtn" style="width: auto; height: auto; padding: 12px 24px; border-radius: 40px; font-size: 1rem; display: inline-flex;">
                            <i class="fas fa-sync-alt" style="margin-right: 8px;"></i>
                            <span>Сгенерировать новый</span>
                        </button>
                    </div>
                </div>
            `;
            const generateAgainBtn = document.getElementById('generateAgainBtn');
            if (generateAgainBtn) {
                generateAgainBtn.addEventListener('click', generateFractal);
            }
        }

        function showButton() {
            centerWrapper.innerHTML = `
                <button class="generate-btn" id="generateBtn">
                    <i class="fas fa-cube"></i>
                    <span>Сгенерировать</span>
                </button>
            `;
            const newGenerateBtn = document.getElementById('generateBtn');
            if (newGenerateBtn) {
                newGenerateBtn.addEventListener('click', generateFractal);
            }
        }

        async function generateFractal() {
            const token = getToken();
            if (!token) {
                showToast('Необходимо авторизоваться', true);
                await checkAuth();
                return;
            }

            showLoading();

            try {
                const response = await fetch('/fractal/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    showFractal(data.image);
                    showToast('Фрактал успешно сгенерирован и добавлен в вашу коллекцию!');
                } else if (response.status === 401) {
                    showToast('Сессия истекла, войдите заново', true);
                    localStorage.removeItem('jwt_token');
                    localStorage.removeItem('wallet_address');
                    document.cookie = 'jwt_token=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
                    await checkAuth();
                    showButton();
                } else {
                    showToast('Ошибка: ' + (data.error || 'Неизвестная ошибка'), true);
                    showButton();
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Ошибка соединения с сервером', true);
                showButton();
            }
        }

        async function connectWallet() {
            if (!window.ethereum) {
                showToast('Web3 кошелек не обнаружен. Установите MetaMask', true);
                return;
            }

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length === 0) {
                    showToast('Нет доступных аккаунтов', true);
                    return;
                }

                const address = accounts[0];
                showToast(`Подключаем ${address.slice(0, 6)}...${address.slice(-4)}`);

                const nonceResponse = await fetch('/auth/nonce', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                });
                const nonceData = await nonceResponse.json();
                const nonce = nonceData.nonce;

                const message = `Вход на Abscure Trade: ${nonce}`;
                const signature = await window.ethereum.request({
                    method: 'personal_sign',
                    params: [message, address]
                });

                const loginResponse = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, signature }),
                    credentials: 'same-origin'
                });
                const loginData = await loginResponse.json();

                if (loginResponse.ok) {
                    localStorage.setItem('jwt_token', loginData.access_token);
                    localStorage.setItem('wallet_address', address);
                    document.cookie = `jwt_token=${loginData.access_token}; path=/; max-age=86400; SameSite=Lax`;
                    showToast('Успешный вход!');
                    await checkAuth();
                } else {
                    showToast('Ошибка входа: ' + loginData.error, true);
                }
            } catch (error) {
                console.error(error);
                showToast('Ошибка: ' + error.message, true);
            }
        }

        if (generateBtn) {
            generateBtn.addEventListener('click', generateFractal);
        }
        if (connectWalletBtn) {
            connectWalletBtn.addEventListener('click', connectWallet);
        }

        checkAuth();
    </script>
</body>
</html>
