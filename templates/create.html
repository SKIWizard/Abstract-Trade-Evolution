<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Trade · Генератор фракталов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #eef2fb;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(11,14,20,0.95);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.6rem;
            text-decoration: none;
            color: white;
        }

        .logo i {
            color: #0855d1;
            font-size: 1.8rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: #eef2fb;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(8,85,209,0.2);
            border-color: #0855d1;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .controls {
            text-align: center;
            margin-bottom: 40px;
        }

        .generate-btn {
            background: linear-gradient(145deg, #0855d1, #042f73);
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(8,85,209,0.3);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(8,85,209,0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn i {
            font-size: 1.3rem;
        }

        .fractal-container {
            background: #10161f;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #2a3343;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .fractal-image {
            width: 100%;
            border-radius: 20px;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .loading i {
            font-size: 3rem;
            color: #0855d1;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            border-left: 4px solid #0855d1;
            z-index: 1100;
            color: #eef2fb;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }
            .logo {
                font-size: 1.2rem;
            }
            .main-container {
                padding: 24px 16px;
            }
            .generate-btn {
                padding: 12px 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <i class="fas fa-cube"></i>
            <span>Abstract Trade</span>
        </a>
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            <span>На главную</span>
        </a>
    </header>

    <div class="main-container">
        <div class="controls">
            <button class="generate-btn" id="generateBtn">
                <i class="fas fa-cube"></i>
                <span>Сгенерировать фрактал</span>
            </button>
        </div>

        <div class="fractal-container" id="fractalContainer" style="display: none;">
            <img id="fractalImage" class="fractal-image" alt="Фрактал">
        </div>

        <div id="loadingPlaceholder" class="loading" style="display: none;">
            <i class="fas fa-spinner"></i>
            <p>Генерация фрактала...</p>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const generateBtn = document.getElementById('generateBtn');
        const fractalContainer = document.getElementById('fractalContainer');
        const loadingPlaceholder = document.getElementById('loadingPlaceholder');
        const fractalImage = document.getElementById('fractalImage');
        const toast = document.getElementById('toastMsg');

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.opacity = '1';
            toast.style.borderLeftColor = isError ? '#e5484d' : '#0855d1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        async function generateFractal() {
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Генерация...</span>';
            fractalContainer.style.display = 'none';
            loadingPlaceholder.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE_URL}/fractal/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    fractalImage.src = data.image;
                    fractalContainer.style.display = 'block';
                    showToast('Фрактал успешно сгенерирован!');
                } else {
                    showToast('Ошибка: ' + data.error, true);
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Ошибка соединения с сервером', true);
            } finally {
                loadingPlaceholder.style.display = 'none';
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fas fa-cube"></i><span>Сгенерировать фрактал</span>';
            }
        }

        generateBtn.addEventListener('click', generateFractal);
    </script>
</body>
</html>
