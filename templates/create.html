<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Trade · Генератор фракталов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #eef2fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(11,14,20,0.95);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.6rem;
            text-decoration: none;
            color: white;
        }

        .logo i {
            color: #0855d1;
            font-size: 1.8rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: #eef2fb;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(8,85,209,0.2);
            border-color: #0855d1;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .center-wrapper {
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .generate-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(145deg, #0855d1, #042f73);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            box-shadow: 0 0 60px rgba(8,85,209,0.3), 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(145deg, rgba(255,255,255,0.2), transparent 60%);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        .generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 90px rgba(8,85,209,0.5), 0 24px 48px rgba(0,0,0,0.6);
        }

        .generate-btn:active {
            transform: scale(0.95);
            transition: all 0.1s ease;
        }

        .generate-btn i {
            font-size: 2.5rem;
        }

        .fractal-container {
            width: 100%;
            background: #10161f;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #2a3343;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease;
        }

        .fractal-image {
            width: 100%;
            border-radius: 20px;
            display: block;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .loading i {
            font-size: 3rem;
            color: #0855d1;
            animation: spin 1s linear infinite;
        }

        .loading p {
            color: #8e9db5;
            font-size: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            border-left: 4px solid #0855d1;
            z-index: 1100;
            color: #eef2fb;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }
            .logo {
                font-size: 1.2rem;
            }
            .main-container {
                padding: 24px 16px;
            }
            .generate-btn {
                width: 180px;
                height: 180px;
                font-size: 1.1rem;
            }
            .generate-btn i {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .generate-btn {
                width: 150px;
                height: 150px;
                font-size: 0.95rem;
                gap: 10px;
            }
            .generate-btn i {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <i class="fas fa-cube"></i>
            <span>Abstract Trade</span>
        </a>
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            <span>На главную</span>
        </a>
    </header>

    <div class="main-container">
        <div class="center-wrapper" id="centerWrapper">
            <button class="generate-btn" id="generateBtn">
                <i class="fas fa-cube"></i>
                <span>Сгенерировать</span>
            </button>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const centerWrapper = document.getElementById('centerWrapper');
        const generateBtn = document.getElementById('generateBtn');
        const toast = document.getElementById('toastMsg');

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.opacity = '1';
            toast.style.borderLeftColor = isError ? '#e5484d' : '#0855d1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        function showLoading() {
            centerWrapper.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Генерация фрактала...</p>
                </div>
            `;
        }

        function showFractal(imageSrc) {
            centerWrapper.innerHTML = `
                <div class="fractal-container">
                    <img class="fractal-image" src="${imageSrc}" alt="Фрактал">
                </div>
            `;
        }

        function showButton() {
            centerWrapper.innerHTML = `
                <button class="generate-btn" id="generateBtn">
                    <i class="fas fa-cube"></i>
                    <span>Сгенерировать</span>
                </button>
            `;
            document.getElementById('generateBtn').addEventListener('click', generateFractal);
        }

        async function generateFractal() {
            showLoading();

            try {
                const response = await fetch(`${API_BASE_URL}/fractal/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showFractal(data.image);
                    showToast('Фрактал успешно сгенерирован!');
                } else {
                    showToast('Ошибка: ' + data.error, true);
                    showButton();
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Ошибка соединения с сервером', true);
                showButton();
            }
        }

        generateBtn.addEventListener('click', generateFractal);
    </script>
</body>
</html>
